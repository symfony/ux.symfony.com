framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            assets/: ''
            vendor/symfony/ux-toolkit/kits/: '@symfony/ux-toolkit/kits'
            vendor/symfony/ux-editor/assets/: '@symfony/ux-editor'
            vendor/symfony/ux-editor-ckeditor/assets/: '@symfony/ux-editor-ckeditor'
            vendor/symfony/ux-editor-editorjs/assets/: '@symfony/ux-editor-editorjs'
            vendor/symfony/ux-editor-grapesjs/assets/: '@symfony/ux-editor-grapesjs'
        excluded_patterns:
            - '*/assets/styles/**/_*.css'
            - '*/assets/styles/**/_*.scss'
            - '*/assets/icons/**'
            - '*/assets/react/build**'     # React build dir
            - '*/assets/react/src**'       # React sources
            - '*/kits/**/*.html.twig'      # UX Toolkit kit Twig templates
            - '*/kits/**/*.md'             # UX Toolkit kit documentation
            - '*/kits/**/manifest.json'    # UX Toolkit kit manifest files
        importmap_polyfill: false
        missing_import_mode: strict

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn

react:
    controllers_path: '%kernel.project_dir%/assets/react/dist/controllers'
